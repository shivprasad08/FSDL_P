<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q9 - Drag and Drop List (Detailed)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
  .app { width: 100%; max-width: 520px; }

  h2 { font-size: 1.8rem; color: #2d3436; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #aaa; margin-bottom: 24px; }

  /* ADD FORM */
  .add-row { display: flex; gap: 10px; margin-bottom: 20px; }
  .add-row input { flex: 1; padding: 11px 14px; border: 2px solid #eee; border-radius: 10px; font-family: inherit; font-size: 0.9rem; outline: none; transition: border 0.2s; }
  .add-row input:focus { border-color: #6c5ce7; }
  .add-row button { padding: 11px 18px; background: #6c5ce7; color: #fff; border: none; border-radius: 10px; font-family: inherit; font-size: 0.9rem; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
  .add-row button:hover { opacity: 0.85; }

  /* STATS */
  .stats { display: flex; gap: 16px; margin-bottom: 16px; }
  .stat { background: #fff; border-radius: 8px; padding: 10px 16px; font-size: 0.78rem; color: #aaa; box-shadow: 0 1px 4px rgba(0,0,0,0.07); }
  .stat b { color: #6c5ce7; font-size: 1rem; display: block; }

  /* LIST */
  .list { list-style: none; }

  .item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px; background: #fff;
    border: 2px solid #eee; border-radius: 12px;
    margin-bottom: 10px; cursor: grab;
    transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
    user-select: none; animation: slideIn 0.25s ease;
  }
  @keyframes slideIn { from { opacity:0; transform:translateX(-10px); } to { opacity:1; transform:translateX(0); } }
  .item:active  { cursor: grabbing; }
  .item.dragging { opacity: 0.3; transform: scale(0.97); box-shadow: 0 8px 24px rgba(0,0,0,0.15); }
  .item.over    { border-color: #6c5ce7; background: #f5f3ff; transform: scale(1.01); }
  .item.done .item-text { text-decoration: line-through; color: #bbb; }

  .handle { color: #ccc; font-size: 1.2rem; cursor: grab; flex-shrink: 0; }
  .num { background: #6c5ce7; color: #fff; min-width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.78rem; font-weight: 700; flex-shrink: 0; transition: background 0.2s; }
  .item.done .num { background: #00b894; }

  .item-text { flex: 1; font-size: 0.92rem; color: #2d3436; }
  .priority  { font-size: 0.68rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; flex-shrink: 0; }
  .high   { background: #fee2e2; color: #e74c3c; }
  .medium { background: #fef3c7; color: #f59e0b; }
  .low    { background: #d1fae5; color: #10b981; }

  .check-btn { background: none; border: 2px solid #eee; width: 26px; height: 26px; border-radius: 50%; cursor: pointer; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; }
  .item.done .check-btn { background: #00b894; border-color: #00b894; color: #fff; }
  .del-btn   { background: none; border: none; color: #ddd; font-size: 1rem; cursor: pointer; flex-shrink: 0; transition: color 0.15s; }
  .del-btn:hover { color: #e74c3c; }

  /* DROP ZONE */
  .drop-hint { border: 2px dashed #ddd; border-radius: 12px; padding: 20px; text-align: center; color: #ccc; font-size: 0.85rem; display: none; }
  .empty .drop-hint { display: block; }
</style>
</head>
<body>
<div class="app">
  <h2>↕ Drag & Drop List</h2>
  <div class="subtitle">Drag items to reorder · Click ✓ to mark done · Add your own tasks</div>

  <div class="add-row">
    <input id="newTask" placeholder="Add a new task..." onkeydown="if(event.key==='Enter') addItem()">
    <button onclick="addItem()">+ Add</button>
  </div>

  <div class="stats">
    <div class="stat"><b id="totalStat">6</b>Total</div>
    <div class="stat"><b id="doneStat">0</b>Done</div>
    <div class="stat"><b id="leftStat">6</b>Left</div>
  </div>

  <ul class="list" id="list"></ul>
  <div class="drop-hint" id="dropHint">📋 No tasks! Add one above.</div>
</div>

<script>
  let tasks = [
    { text:'Learn HTML & CSS',        priority:'high',   done:false },
    { text:'Learn JavaScript',         priority:'high',   done:false },
    { text:'Build Small Projects',     priority:'medium', done:false },
    { text:'Learn React.js',           priority:'medium', done:false },
    { text:'Learn Node.js & Express',  priority:'low',    done:false },
    { text:'Deploy to Production',     priority:'low',    done:false },
  ];

  let dragged = null;

  function render() {
    const list = document.getElementById('list');
    list.innerHTML = '';

    tasks.forEach((t, i) => {
      const li = document.createElement('li');
      li.className = 'item' + (t.done ? ' done' : '');
      li.draggable = true;
      li.innerHTML = `
        <span class="handle">⠿</span>
        <span class="num">${i+1}</span>
        <span class="item-text">${t.text}</span>
        <span class="priority ${t.priority}">${t.priority}</span>
        <button class="check-btn" onclick="toggle(${i})">${t.done ? '✓' : ''}</button>
        <button class="del-btn"   onclick="del(${i})">🗑</button>`;

      li.addEventListener('dragstart', () => {
        dragged = li;
        dragged._index = i;
        setTimeout(() => li.classList.add('dragging'), 0);
      });
      li.addEventListener('dragend', () => {
        li.classList.remove('dragging');
        list.querySelectorAll('.item').forEach(el => el.classList.remove('over'));
      });
      li.addEventListener('dragover', e => {
        e.preventDefault();
        list.querySelectorAll('.item').forEach(el => el.classList.remove('over'));
        li.classList.add('over');
      });
      li.addEventListener('drop', e => {
        e.preventDefault();
        const from = dragged._index, to = i;
        if (from !== to) {
          const moved = tasks.splice(from, 1)[0];
          tasks.splice(to, 0, moved);
          render();
        }
      });

      list.appendChild(li);
    });

    updateStats();
    document.getElementById('dropHint').style.display = tasks.length === 0 ? 'block' : 'none';
  }

  function toggle(i) { tasks[i].done = !tasks[i].done; render(); }
  function del(i)    { tasks.splice(i,1); render(); }

  function addItem() {
    const val = document.getElementById('newTask').value.trim();
    if (!val) return;
    tasks.push({ text: val, priority: 'medium', done: false });
    document.getElementById('newTask').value = '';
    render();
  }

  function updateStats() {
    const done  = tasks.filter(t => t.done).length;
    document.getElementById('totalStat').textContent = tasks.length;
    document.getElementById('doneStat').textContent  = done;
    document.getElementById('leftStat').textContent  = tasks.length - done;
  }

  render();
</script>
</body>
</html>
