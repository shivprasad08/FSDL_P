<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q14 - String Operations (Detailed)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; justify-content: center; padding: 40px 20px; }
  .app { background: #fff; border-radius: 16px; padding: 32px; width: 100%; max-width: 560px; box-shadow: 0 4px 24px rgba(0,0,0,0.1); height: fit-content; }

  h2 { font-size: 1.6rem; color: #2d3436; margin-bottom: 6px; }
  p  { font-size: 0.85rem; color: #aaa; margin-bottom: 22px; }

  .input-wrap { position: relative; margin-bottom: 20px; }
  input {
    width: 100%; padding: 14px 50px 14px 16px;
    border: 2px solid #eee; border-radius: 10px;
    font-size: 1rem; font-family: inherit; outline: none; transition: border 0.2s;
  }
  input:focus { border-color: #6c5ce7; }
  .char-count { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 0.78rem; color: #aaa; }

  .btn-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
  .op-btn {
    padding: 12px 8px; border: 2px solid #eee; background: #fff;
    border-radius: 10px; cursor: pointer; font-size: 0.82rem; font-family: inherit;
    color: #636e72; font-weight: 600; transition: all 0.2s; text-align: center;
  }
  .op-btn:hover       { border-color: #6c5ce7; color: #6c5ce7; background: #f5f3ff; }
  .op-btn.active      { background: #6c5ce7; color: #fff; border-color: #6c5ce7; }
  .op-btn .op-icon    { font-size: 1.3rem; display: block; margin-bottom: 4px; }

  /* RESULT CARD */
  .result-card { background: #f8f9ff; border: 2px solid #eee; border-radius: 12px; padding: 20px; min-height: 80px; transition: border-color 0.2s; }
  .result-card.show { border-color: #6c5ce7; }
  .result-label { font-size: 0.72rem; letter-spacing: 2px; text-transform: uppercase; color: #aaa; margin-bottom: 8px; }
  .result-value { font-size: 1.1rem; font-weight: 700; color: #2d3436; word-break: break-all; }
  .result-sub   { font-size: 0.82rem; color: #aaa; margin-top: 6px; }

  /* STATS ROW */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
  .stat  { background: #f8f9fa; border-radius: 8px; padding: 12px; text-align: center; }
  .stat-num  { font-size: 1.3rem; font-weight: 700; color: #6c5ce7; }
  .stat-name { font-size: 0.72rem; color: #aaa; margin-top: 2px; }
</style>
</head>
<body>
<div class="app">
  <h2>🔤 String Operations</h2>
  <p>Type a string and click an operation to see the result.</p>

  <div class="input-wrap">
    <input id="inp" placeholder="Type any string here..." oninput="updateStats()">
    <span class="char-count" id="charCount">0</span>
  </div>

  <div class="btn-grid">
    <button class="op-btn" onclick="op('reverse',this)">   <span class="op-icon">↩️</span>Reverse</button>
    <button class="op-btn" onclick="op('upper',this)">     <span class="op-icon">🔠</span>Uppercase</button>
    <button class="op-btn" onclick="op('lower',this)">     <span class="op-icon">🔡</span>Lowercase</button>
    <button class="op-btn" onclick="op('length',this)">    <span class="op-icon">📏</span>Length</button>
    <button class="op-btn" onclick="op('words',this)">     <span class="op-icon">📝</span>Word Count</button>
    <button class="op-btn" onclick="op('palindrome',this)"><span class="op-icon">🔁</span>Palindrome?</button>
    <button class="op-btn" onclick="op('vowels',this)">    <span class="op-icon">🅰️</span>Vowel Count</button>
    <button class="op-btn" onclick="op('title',this)">     <span class="op-icon">✏️</span>Title Case</button>
    <button class="op-btn" onclick="op('trim',this)">      <span class="op-icon">✂️</span>Trim Spaces</button>
  </div>

  <div class="result-card" id="card">
    <div class="result-label" id="label">Operation</div>
    <div class="result-value" id="value">Click an operation above...</div>
    <div class="result-sub"   id="sub"></div>
  </div>

  <div class="stats">
    <div class="stat"><div class="stat-num" id="sChars">0</div><div class="stat-name">Chars</div></div>
    <div class="stat"><div class="stat-num" id="sWords">0</div><div class="stat-name">Words</div></div>
    <div class="stat"><div class="stat-num" id="sVowels">0</div><div class="stat-name">Vowels</div></div>
    <div class="stat"><div class="stat-num" id="sSpaces">0</div><div class="stat-name">Spaces</div></div>
  </div>
</div>

<script>
  function getInput() { return document.getElementById('inp').value; }

  function updateStats() {
    const s = getInput();
    document.getElementById('charCount').textContent = s.length;
    document.getElementById('sChars').textContent    = s.length;
    document.getElementById('sWords').textContent    = s.trim() ? s.trim().split(/\s+/).length : 0;
    document.getElementById('sVowels').textContent   = (s.match(/[aeiouAEIOU]/g) || []).length;
    document.getElementById('sSpaces').textContent   = (s.match(/ /g) || []).length;
  }

  function op(type, btn) {
    const s = getInput();
    if (!s) { showResult('⚠️ Input Empty', 'Please type something first.', ''); return; }

    document.querySelectorAll('.op-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const ops = {
      reverse:   { label: 'Reversed String',   value: s.split('').reverse().join(''),                     sub: `Original: "${s}"` },
      upper:     { label: 'Uppercase',          value: s.toUpperCase(),                                    sub: '' },
      lower:     { label: 'Lowercase',          value: s.toLowerCase(),                                    sub: '' },
      length:    { label: 'String Length',      value: `${s.length} characters`,                           sub: `Without spaces: ${s.replace(/ /g,'').length}` },
      words:     { label: 'Word Count',         value: `${s.trim().split(/\s+/).length} words`,            sub: s.trim().split(/\s+/).join(' | ') },
      palindrome: (() => {
        const clean = s.toLowerCase().replace(/[^a-z0-9]/g, '');
        const is    = clean === clean.split('').reverse().join('');
        return { label: 'Palindrome Check', value: is ? '✅ Yes, it is a palindrome!' : '❌ Not a palindrome', sub: `Cleaned: "${clean}"` };
      })(),
      vowels:    { label: 'Vowel Count',        value: `${(s.match(/[aeiouAEIOU]/g) || []).length} vowels`, sub: `Vowels found: ${[...(s.match(/[aeiouAEIOU]/g) || [])].join(', ')}` },
      title:     { label: 'Title Case',         value: s.replace(/\b\w/g, c => c.toUpperCase()),           sub: '' },
      trim:      { label: 'Trimmed String',     value: `"${s.trim()}"`,                                    sub: `Removed ${s.length - s.trim().length} leading/trailing spaces` },
    };

    const r = ops[type];
    showResult(r.label, r.value, r.sub);
  }

  function showResult(label, value, sub) {
    document.getElementById('label').textContent = label;
    document.getElementById('value').textContent = value;
    document.getElementById('sub').textContent   = sub;
    document.getElementById('card').classList.add('show');
  }
</script>
</body>
</html>
