<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Record Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Student Record Management System</h1>
            <p class="subtitle">Manage student records with CRUD operations</p>
        </header>

        <div class="content">
            <aside class="sidebar">
                <div class="form-section">
                    <h2>Add/Edit Student</h2>
                    <form id="studentForm">
                        <div class="form-group">
                            <label for="name">Name *</label>
                            <input type="text" id="name" name="name" placeholder="Student name" required>
                            <span class="error" id="nameError"></span>
                        </div>

                        <div class="form-group">
                            <label for="rollNo">Roll No *</label>
                            <input type="text" id="rollNo" name="rollNo" placeholder="Roll number" required>
                            <span class="error" id="rollNoError"></span>
                        </div>

                        <div class="form-group">
                            <label for="branch">Branch *</label>
                            <select id="branch" name="branch" required>
                                <option value="">Select branch</option>
                                <option value="Computer Science">Computer Science</option>
                                <option value="Information Technology">Information Technology</option>
                                <option value="Electronics">Electronics</option>
                                <option value="Mechanical">Mechanical</option>
                                <option value="Civil">Civil</option>
                            </select>
                            <span class="error" id="branchError"></span>
                        </div>

                        <div class="form-group">
                            <label for="email">Email *</label>
                            <input type="email" id="email" name="email" placeholder="Email address" required>
                            <span class="error" id="emailError"></span>
                        </div>

                        <div class="form-group">
                            <label for="phone">Phone *</label>
                            <input type="tel" id="phone" name="phone" placeholder="Phone number" required>
                            <span class="error" id="phoneError"></span>
                        </div>

                        <div class="form-group">
                            <label for="address">Address *</label>
                            <textarea id="address" name="address" placeholder="Address" rows="3" required></textarea>
                            <span class="error" id="addressError"></span>
                        </div>

                        <div class="form-buttons">
                            <button type="submit" class="btn btn-submit" id="submitBtn">Add Student</button>
                            <button type="reset" class="btn btn-reset" id="resetBtn">Clear</button>
                            <button type="button" class="btn btn-cancel" id="cancelBtn" style="display: none;">Cancel</button>
                        </div>

                        <div id="formMessage" class="message"></div>
                    </form>
                </div>
            </aside>

            <main class="main-content">
                <div class="search-section">
                    <input type="text" id="searchInput" placeholder="Search by name, roll no, or email..." class="search-box">
                    <span class="result-count">Total: <span id="studentCount">0</span> students</span>
                </div>

                <div id="tableContainer">
                    <table class="student-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Roll No</th>
                                <th>Branch</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Address</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            <!-- Students will be populated here -->
                        </tbody>
                    </table>
                </div>

                <div id="emptyMessage" class="empty-message" style="display: none;">
                    <p>No students found. Add a new student to get started.</p>
                </div>
            </main>
        </div>
    </div>

    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <h2 id="modalTitle">Student Details</h2>
            <div id="modalBody"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
