<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q6 - Product Gallery (Detailed)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; padding: 40px 20px; }
  .container { max-width: 1000px; margin: 0 auto; }

  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
  h2 { font-size: 1.8rem; color: #2d3436; }
  .cart-info { font-size: 0.88rem; color: #aaa; }
  .cart-info b { color: #6c5ce7; }

  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
  .fbtn { padding: 8px 18px; border: 1px solid #eee; background: #fff; border-radius: 20px; cursor: pointer; font-size: 0.82rem; font-family: inherit; color: #636e72; transition: all 0.15s; }
  .fbtn.active, .fbtn:hover { background: #6c5ce7; color: #fff; border-color: #6c5ce7; }
  .sort { margin-left: auto; padding: 8px 14px; border: 1px solid #eee; border-radius: 20px; font-family: inherit; font-size: 0.82rem; background: #fff; outline: none; cursor: pointer; }

  .grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; }
  .card { background: #fff; border-radius: 14px; overflow: hidden; border: 1px solid #eee; transition: transform 0.2s, box-shadow 0.2s; }
  .card:hover { transform: translateY(-4px); box-shadow: 0 10px 28px rgba(0,0,0,0.1); }
  .card.hidden { display: none; }

  .card-img { font-size: 3.5rem; padding: 28px; text-align: center; position: relative; }
  .badge-new { position: absolute; top: 12px; left: 12px; background: #e74c3c; color: #fff; font-size: 0.65rem; font-weight: 700; padding: 3px 8px; border-radius: 10px; }
  .card-body { padding: 14px 16px; }
  .cat-tag { font-size: 0.68rem; letter-spacing: 2px; text-transform: uppercase; color: #6c5ce7; font-weight: 600; margin-bottom: 4px; }
  .card-name { font-size: 1rem; font-weight: 700; color: #2d3436; margin-bottom: 4px; }
  .card-desc { font-size: 0.78rem; color: #aaa; margin-bottom: 8px; line-height: 1.5; }
  .rating { font-size: 0.78rem; color: #f39c12; margin-bottom: 8px; }
  .rating span { color: #aaa; }

  .card-footer { display: flex; justify-content: space-between; align-items: center; padding: 12px 16px; border-top: 1px solid #f0f0f0; }
  .price { font-size: 1.1rem; font-weight: 800; color: #2d3436; }
  .price-old { font-size: 0.75rem; color: #bbb; text-decoration: line-through; margin-left: 4px; }
  .buy-btn { padding: 9px 14px; background: #6c5ce7; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.82rem; font-weight: 600; transition: all 0.2s; }
  .buy-btn:hover { opacity: 0.85; }
  .buy-btn.added { background: #00b894; }

  .toast { position: fixed; bottom: 28px; right: 28px; background: #2d3436; color: #fff; padding: 14px 20px; border-radius: 10px; font-size: 0.88rem; transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 100; }
  .toast.show { transform: translateY(0); opacity: 1; }

  @media(max-width:650px) { .grid { grid-template-columns: 1fr 1fr; } }
  @media(max-width:420px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h2>🛍 Product Gallery</h2>
    <div class="cart-info">🛒 <b id="cartCount">0</b> items | <b id="cartTotal">₹0</b></div>
  </div>

  <div class="toolbar">
    <button class="fbtn active" onclick="setFilter('all',this)">All</button>
    <button class="fbtn" onclick="setFilter('Electronics',this)">⚡ Electronics</button>
    <button class="fbtn" onclick="setFilter('Accessories',this)">🎒 Accessories</button>
    <button class="fbtn" onclick="setFilter('Fashion',this)">👗 Fashion</button>
    <button class="fbtn" onclick="setFilter('Kitchen',this)">☕ Kitchen</button>
    <select class="sort" onchange="sortCards(this.value)">
      <option value="">Sort By</option>
      <option value="asc">Price ↑</option>
      <option value="desc">Price ↓</option>
    </select>
  </div>

  <div class="grid" id="grid"></div>
</div>
<div class="toast" id="toast"></div>

<script>
  const products = [
    { name:'Headphones',   price:1499, old:1999, icon:'🎧', cat:'Electronics', desc:'Noise-cancelling wireless headphones.', rating:4.5, reviews:128, isNew:true  },
    { name:'Smartwatch',   price:3999, old:4999, icon:'⌚', cat:'Electronics', desc:'Fitness tracking & notifications.',      rating:4.2, reviews:89,  isNew:false },
    { name:'Keyboard',     price:1199, old:1499, icon:'⌨️', cat:'Accessories', desc:'Mechanical RGB backlit keyboard.',      rating:4.7, reviews:203, isNew:false },
    { name:'Wireless Mouse',price:799, old:999,  icon:'🖱️', cat:'Accessories', desc:'Ergonomic silent wireless mouse.',      rating:4.3, reviews:156, isNew:true  },
    { name:'Coffee Mug',   price:299,  old:399,  icon:'☕', cat:'Kitchen',     desc:'Double-walled insulated travel mug.',   rating:4.6, reviews:312, isNew:false },
    { name:'Backpack',     price:1799, old:2299, icon:'🎒', cat:'Fashion',     desc:'25L waterproof laptop backpack.',       rating:4.4, reviews:74,  isNew:false },
    { name:'Sunglasses',   price:899,  old:1199, icon:'🕶️', cat:'Fashion',     desc:'UV400 polarised sunglasses.',          rating:4.1, reviews:61,  isNew:true  },
    { name:'Desk Lamp',    price:549,  old:699,  icon:'💡', cat:'Accessories', desc:'LED eye-care lamp with dimmer.',        rating:4.5, reviews:98,  isNew:false },
    { name:'Water Bottle', price:399,  old:499,  icon:'🍶', cat:'Kitchen',     desc:'1L stainless steel water bottle.',      rating:4.8, reviews:445, isNew:false },
  ];

  let currentFilter = 'all';
  let cartCount = 0, cartTotal = 0;

  const bgMap = { Electronics:'#dbeafe', Accessories:'#d1fae5', Fashion:'#fce7f3', Kitchen:'#fef3c7' };
  const stars  = r => '★'.repeat(Math.floor(r)) + (r%1>=0.5?'½':'') + '☆'.repeat(5-Math.ceil(r));

  function render() {
    document.getElementById('grid').innerHTML = products.map((p,i) => `
      <div class="card ${currentFilter!=='all' && p.cat!==currentFilter ? 'hidden':''}" data-price="${p.price}" data-cat="${p.cat}">
        <div class="card-img" style="background:${bgMap[p.cat]||'#f5f5f5'}">
          ${p.isNew ? '<span class="badge-new">NEW</span>' : ''}
          ${p.icon}
        </div>
        <div class="card-body">
          <div class="cat-tag">${p.cat}</div>
          <div class="card-name">${p.name}</div>
          <div class="card-desc">${p.desc}</div>
          <div class="rating">${stars(p.rating)} <span>(${p.reviews})</span></div>
        </div>
        <div class="card-footer">
          <div><span class="price">₹${p.price.toLocaleString()}</span><span class="price-old">₹${p.old.toLocaleString()}</span></div>
          <button class="buy-btn" id="btn${i}" onclick="buy(${i})">🛒 Buy Now</button>
        </div>
      </div>`).join('');
  }

  function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.fbtn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.card').forEach(c =>
      c.classList.toggle('hidden', f!=='all' && c.dataset.cat!==f));
  }

  function sortCards(dir) {
    if (!dir) return;
    const grid  = document.getElementById('grid');
    const cards = [...grid.querySelectorAll('.card')];
    cards.sort((a,b) => dir==='asc'
      ? Number(a.dataset.price)-Number(b.dataset.price)
      : Number(b.dataset.price)-Number(a.dataset.price));
    cards.forEach(c => grid.appendChild(c));
  }

  function buy(i) {
    const p = products[i], btn = document.getElementById('btn'+i);
    cartCount++; cartTotal += p.price;
    document.getElementById('cartCount').textContent = cartCount;
    document.getElementById('cartTotal').textContent = '₹'+cartTotal.toLocaleString();
    btn.textContent = '✅ Added!'; btn.classList.add('added');
    setTimeout(() => { btn.textContent='🛒 Buy Now'; btn.classList.remove('added'); }, 1500);
    const t = document.getElementById('toast');
    t.textContent = `✅ "${p.name}" added to cart!`;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
  }

  render();
</script>
</body>
</html>
