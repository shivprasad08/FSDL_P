<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Registration Form</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Inconsolata:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --card: #141414;
    --border: #2a2a2a;
    --accent: #00ff88;
    --accent2: #00ccff;
    --text: #e8e8e8;
    --muted: #666;
    --error: #ff4757;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    font-family: 'Inconsolata', monospace;
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 40px 20px;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,136,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,136,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }

  .container {
    max-width: 680px;
    width: 100%;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  .header {
    margin-bottom: 32px;
  }
  .header .tag {
    font-size: 0.7rem;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }
  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2.6rem;
    font-weight: 800;
    margin-top: 6px;
    line-height: 1.05;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header p {
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 8px;
  }

  /* FORM CARD */
  .form-card {
    background: var(--card);
    border: 1px solid var(--border);
    padding: 40px;
    position: relative;
    overflow: hidden;
  }
  .form-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  /* STEP INDICATOR */
  .steps {
    display: flex;
    gap: 0;
    margin-bottom: 36px;
    border-bottom: 1px solid var(--border);
  }
  .step {
    flex: 1;
    padding: 10px 4px;
    font-size: 0.7rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    position: relative;
    cursor: default;
  }
  .step.active {
    color: var(--accent);
  }
  .step.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
  }

  /* FIELD GROUPS */
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  .row.single { grid-template-columns: 1fr; }
  .row.three { grid-template-columns: 1fr 1fr 1fr; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label {
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 500;
  }
  .field label span { color: var(--accent); }

  .field input,
  .field select,
  .field textarea {
    background: #1a1a1a;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 14px;
    font-family: 'Inconsolata', monospace;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    -webkit-appearance: none;
  }
  .field input:focus,
  .field select:focus,
  .field textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 2px rgba(0,255,136,0.08);
  }
  .field input::placeholder,
  .field textarea::placeholder { color: #3a3a3a; }
  .field select option { background: #1a1a1a; }
  .field textarea { resize: vertical; min-height: 90px; }

  /* Invalid state */
  .field input.invalid,
  .field select.invalid { border-color: var(--error); }
  .field .err-msg { font-size: 0.72rem; color: var(--error); display: none; }
  .field input.invalid ~ .err-msg,
  .field select.invalid ~ .err-msg { display: block; }

  /* GENDER RADIOS */
  .radio-group { display: flex; gap: 12px; }
  .radio-label {
    display: flex; align-items: center; gap: 8px;
    cursor: pointer;
    font-size: 0.88rem;
    color: var(--muted);
    padding: 10px 16px;
    border: 1px solid var(--border);
    transition: all 0.2s;
    flex: 1;
    justify-content: center;
  }
  .radio-label:has(input:checked) {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,255,136,0.05);
  }
  .radio-label input { display: none; }

  /* COURSE SELECT */
  .course-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .course-option {
    padding: 9px 6px;
    border: 1px solid var(--border);
    text-align: center;
    font-size: 0.78rem;
    cursor: pointer;
    color: var(--muted);
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .course-option.selected {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(0,204,255,0.05);
  }
  .course-option:hover { border-color: #444; color: var(--text); }
  #course-input { display: none; }

  /* DIVIDER */
  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 28px 0;
  }

  /* SUBMIT */
  .submit-row {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-top: 28px;
  }
  .btn-submit {
    flex: 1;
    padding: 14px;
    background: var(--accent);
    color: #000;
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    border: none;
    cursor: pointer;
    transition: transform 0.15s, opacity 0.15s;
  }
  .btn-submit:hover { opacity: 0.85; transform: translateY(-1px); }
  .btn-submit:active { transform: translateY(0); }
  .btn-reset {
    padding: 14px 20px;
    background: transparent;
    color: var(--muted);
    font-family: 'Inconsolata', monospace;
    font-size: 0.85rem;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }
  .btn-reset:hover { border-color: var(--error); color: var(--error); }

  /* SUCCESS */
  .success-overlay {
    display: none;
    position: absolute;
    inset: 0;
    background: var(--card);
    z-index: 10;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 12px;
    padding: 40px;
  }
  .success-overlay.show { display: flex; }
  .success-icon { font-size: 3rem; }
  .success-overlay h2 {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--accent);
  }
  .success-overlay p { color: var(--muted); font-size: 0.85rem; }
  .success-data {
    background: #1a1a1a;
    border: 1px solid var(--border);
    padding: 16px 24px;
    text-align: left;
    margin-top: 8px;
    font-size: 0.8rem;
    line-height: 2;
    width: 100%;
    max-width: 380px;
  }
  .success-data span { color: var(--accent2); }
  .btn-back {
    margin-top: 8px;
    padding: 10px 24px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Inconsolata', monospace;
    font-size: 0.85rem;
    cursor: pointer;
    letter-spacing: 2px;
  }

  @media (max-width: 560px) {
    .row { grid-template-columns: 1fr; }
    .row.three { grid-template-columns: 1fr 1fr; }
    .course-grid { grid-template-columns: 1fr 1fr; }
    .form-card { padding: 24px; }
    .header h1 { font-size: 2rem; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="tag">// Form · 2025</div>
    <h1>Student<br>Registration</h1>
    <p>Fill out all required fields marked with <span style="color:var(--accent)">*</span></p>
  </div>

  <div class="form-card">
    <!-- SUCCESS OVERLAY -->
    <div class="success-overlay" id="successOverlay">
      <div class="success-icon">✦</div>
      <h2>Registered!</h2>
      <p>Your details have been submitted successfully.</p>
      <div class="success-data" id="successData"></div>
      <button class="btn-back" onclick="resetForm()">← Register Another</button>
    </div>

    <!-- STEP INDICATORS -->
    <div class="steps">
      <div class="step active">Personal</div>
      <div class="step active">Academic</div>
      <div class="step active">Contact</div>
    </div>

    <!-- PERSONAL INFO -->
    <div class="row">
      <div class="field">
        <label>First Name <span>*</span></label>
        <input type="text" id="fname" placeholder="Alex">
        <div class="err-msg">Required field</div>
      </div>
      <div class="field">
        <label>Last Name <span>*</span></label>
        <input type="text" id="lname" placeholder="Morgan">
        <div class="err-msg">Required field</div>
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Email Address <span>*</span></label>
        <input type="email" id="email" placeholder="alex@example.com">
        <div class="err-msg">Valid email required</div>
      </div>
      <div class="field">
        <label>Date of Birth</label>
        <input type="date" id="dob">
      </div>
    </div>

    <div class="row single">
      <div class="field">
        <label>Gender <span>*</span></label>
        <div class="radio-group">
          <label class="radio-label"><input type="radio" name="gender" value="Male"> Male</label>
          <label class="radio-label"><input type="radio" name="gender" value="Female"> Female</label>
          <label class="radio-label"><input type="radio" name="gender" value="Other"> Other</label>
        </div>
      </div>
    </div>

    <hr class="divider">

    <!-- ACADEMIC INFO -->
    <div class="row">
      <div class="field">
        <label>Roll Number <span>*</span></label>
        <input type="text" id="rollno" placeholder="CS2025001">
        <div class="err-msg">Required field</div>
      </div>
      <div class="field">
        <label>Year</label>
        <select id="year">
          <option value="">— Select Year —</option>
          <option>First Year</option>
          <option>Second Year</option>
          <option>Third Year</option>
          <option>Final Year</option>
        </select>
      </div>
    </div>

    <div class="row single">
      <div class="field">
        <label>Course / Branch <span>*</span></label>
        <input type="hidden" id="course-input">
        <div class="course-grid">
          <div class="course-option" onclick="selectCourse(this,'CSE')">CSE</div>
          <div class="course-option" onclick="selectCourse(this,'IT')">IT</div>
          <div class="course-option" onclick="selectCourse(this,'ECE')">ECE</div>
          <div class="course-option" onclick="selectCourse(this,'EEE')">EEE</div>
          <div class="course-option" onclick="selectCourse(this,'MECH')">MECH</div>
          <div class="course-option" onclick="selectCourse(this,'CIVIL')">CIVIL</div>
        </div>
      </div>
    </div>

    <hr class="divider">

    <!-- CONTACT -->
    <div class="row single">
      <div class="field">
        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="+91 00000 00000">
      </div>
    </div>

    <div class="row single">
      <div class="field">
        <label>Address <span>*</span></label>
        <textarea id="address" placeholder="House No, Street, City, State – PIN"></textarea>
        <div class="err-msg">Required field</div>
      </div>
    </div>

    <!-- SUBMIT -->
    <div class="submit-row">
      <button class="btn-reset" onclick="resetForm()">RESET</button>
      <button class="btn-submit" onclick="submitForm()">SUBMIT REGISTRATION →</button>
    </div>
  </div>
</div>

<script>
  function selectCourse(el, value) {
    document.querySelectorAll('.course-option').forEach(o => o.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('course-input').value = value;
  }

  function submitForm() {
    let valid = true;
    const required = ['fname','lname','email','rollno','address'];
    required.forEach(id => {
      const el = document.getElementById(id);
      if (!el.value.trim()) { el.classList.add('invalid'); valid = false; }
      else { el.classList.remove('invalid'); }
    });
    // Email check
    const email = document.getElementById('email');
    if (email.value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
      email.classList.add('invalid'); valid = false;
    }
    // Gender check
    const gender = document.querySelector('input[name="gender"]:checked');
    if (!gender) { valid = false; alert('Please select your gender.'); }
    // Course check
    const course = document.getElementById('course-input').value;
    if (!course) { valid = false; alert('Please select a course/branch.'); }
    if (!valid) return;

    const fname = document.getElementById('fname').value;
    const lname = document.getElementById('lname').value;
    const data = document.getElementById('successData');
    data.innerHTML = `
      <span>NAME</span>      ${fname} ${lname}<br>
      <span>EMAIL</span>     ${document.getElementById('email').value}<br>
      <span>GENDER</span>    ${gender.value}<br>
      <span>ROLL NO</span>   ${document.getElementById('rollno').value}<br>
      <span>COURSE</span>    ${course}<br>
      <span>YEAR</span>      ${document.getElementById('year').value || 'N/A'}
    `;
    document.getElementById('successOverlay').classList.add('show');
  }

  function resetForm() {
    document.querySelectorAll('input,select,textarea').forEach(el => {
      if(el.type === 'radio' || el.type === 'hidden') { el.value = ''; el.checked = false; }
      else el.value = '';
      el.classList.remove('invalid');
    });
    document.querySelectorAll('.course-option').forEach(o => o.classList.remove('selected'));
    document.getElementById('successOverlay').classList.remove('show');
  }
</script>
</body>
</html>
