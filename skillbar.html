<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q2 - Skill Bar Component (Detailed)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #f5f6fa; min-height: 100vh; padding: 40px 20px; }
  .container { max-width: 600px; margin: 0 auto; }

  h2 { font-size: 1.8rem; color: #2d3436; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #aaa; margin-bottom: 28px; }

  /* ADD FORM */
  .add-card { background: #fff; border-radius: 12px; padding: 22px; margin-bottom: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .add-card h3 { font-size: 0.95rem; color: #2d3436; margin-bottom: 14px; }
  .form-row { display: flex; gap: 10px; flex-wrap: wrap; }
  .form-row input {
    padding: 10px 14px; border: 2px solid #eee; border-radius: 8px;
    font-size: 0.9rem; font-family: inherit; outline: none; transition: border 0.2s;
  }
  .form-row input:focus { border-color: #6c5ce7; }
  #skillName { flex: 2; min-width: 140px; }
  #skillPct  { flex: 1; min-width: 80px; }
  #skillColor { flex: 0 0 44px; height: 44px; padding: 4px; border: 2px solid #eee; border-radius: 8px; cursor: pointer; }
  .add-btn { padding: 10px 20px; background: #6c5ce7; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 0.9rem; font-weight: 600; transition: opacity 0.2s; white-space: nowrap; }
  .add-btn:hover { opacity: 0.85; }
  .err { font-size: 0.78rem; color: #e74c3c; margin-top: 8px; display: none; }

  /* SKILL CARD */
  .skills-card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
  .skills-card h3 { font-size: 0.95rem; color: #2d3436; margin-bottom: 20px; display: flex; justify-content: space-between; }
  .skills-card h3 span { font-size: 0.78rem; color: #aaa; font-weight: 400; }

  .skill { margin-bottom: 18px; animation: fadeIn 0.4s ease; }
  .skill:last-child { margin-bottom: 0; }
  @keyframes fadeIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

  .skill-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 7px; }
  .skill-name { font-size: 0.9rem; font-weight: 600; color: #2d3436; }
  .skill-right { display: flex; align-items: center; gap: 10px; }
  .skill-pct { font-size: 0.85rem; font-weight: 700; }
  .del-btn { background: none; border: none; cursor: pointer; font-size: 0.9rem; color: #ddd; transition: color 0.15s; }
  .del-btn:hover { color: #e74c3c; }

  .bar-bg { background: #f0f0f0; border-radius: 8px; height: 10px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 8px; width: 0; transition: width 0.8s cubic-bezier(0.4,0,0.2,1); }

  /* LEVEL BADGE */
  .level { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; font-weight: 600; }
  .beginner     { background: #fde8d8; color: #e67e22; }
  .intermediate { background: #dbeafe; color: #2563eb; }
  .advanced     { background: #d5f5e3; color: #27ae60; }
  .expert       { background: #ede9fe; color: #7c3aed; }

  .empty { text-align: center; color: #ccc; padding: 30px 0; font-size: 0.9rem; }
</style>
</head>
<body>
<div class="container">
  <h2>🎯 Skill Bar Component</h2>
  <div class="subtitle">Add skills with proficiency percentage — visualised as animated bars</div>

  <!-- ADD FORM -->
  <div class="add-card">
    <h3>Add a Skill</h3>
    <div class="form-row">
      <input id="skillName"  placeholder="Skill name (e.g. HTML)">
      <input id="skillPct"   type="number" placeholder="%" min="0" max="100">
      <input id="skillColor" type="color" value="#6c5ce7" title="Pick bar colour">
      <button class="add-btn" onclick="addSkill()">+ Add</button>
    </div>
    <div class="err" id="err">Please enter a valid skill name and percentage (0–100).</div>
  </div>

  <!-- SKILLS LIST -->
  <div class="skills-card">
    <h3>Skills <span id="skillCount">4 skills</span></h3>
    <div id="skillList"></div>
    <div class="empty" id="empty" style="display:none">No skills added yet. Add one above!</div>
  </div>
</div>

<script>
  let skills = [
    { name: 'HTML / CSS',  pct: 92, color: '#e74c3c' },
    { name: 'JavaScript',  pct: 78, color: '#f39c12' },
    { name: 'React.js',    pct: 65, color: '#3498db' },
    { name: 'Node.js',     pct: 55, color: '#27ae60' },
  ];

  function getLevel(pct) {
    if (pct >= 85) return ['Expert',       'expert'];
    if (pct >= 65) return ['Advanced',     'advanced'];
    if (pct >= 40) return ['Intermediate', 'intermediate'];
    return              ['Beginner',      'beginner'];
  }

  function render() {
    const list = document.getElementById('skillList');
    if (skills.length === 0) {
      list.innerHTML = '';
      document.getElementById('empty').style.display = 'block';
      document.getElementById('skillCount').textContent = '0 skills';
      return;
    }
    document.getElementById('empty').style.display = 'none';
    document.getElementById('skillCount').textContent = `${skills.length} skill${skills.length !== 1 ? 's' : ''}`;

    list.innerHTML = skills.map((s, i) => {
      const [label, cls] = getLevel(s.pct);
      return `
        <div class="skill">
          <div class="skill-header">
            <span class="skill-name">${s.name}</span>
            <div class="skill-right">
              <span class="level ${cls}">${label}</span>
              <span class="skill-pct" style="color:${s.color}">${s.pct}%</span>
              <button class="del-btn" onclick="del(${i})">🗑</button>
            </div>
          </div>
          <div class="bar-bg">
            <div class="bar-fill" id="bar${i}" style="background:${s.color}"></div>
          </div>
        </div>`;
    }).join('');

    // Animate bars after render
    requestAnimationFrame(() => {
      skills.forEach((s, i) => {
        setTimeout(() => {
          const el = document.getElementById('bar' + i);
          if (el) el.style.width = s.pct + '%';
        }, i * 100);
      });
    });
  }

  function addSkill() {
    const name  = document.getElementById('skillName').value.trim();
    const pct   = parseInt(document.getElementById('skillPct').value);
    const color = document.getElementById('skillColor').value;
    const err   = document.getElementById('err');
    if (!name || isNaN(pct) || pct < 0 || pct > 100) { err.style.display = 'block'; return; }
    err.style.display = 'none';
    skills.push({ name, pct, color });
    render();
    document.getElementById('skillName').value = '';
    document.getElementById('skillPct').value  = '';
  }

  function del(i) { skills.splice(i, 1); render(); }

  render();
</script>
</body>
</html>
