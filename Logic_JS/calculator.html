<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q12 - Calculator (Detailed)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }

  .calc { background: #16213e; border-radius: 20px; padding: 24px; width: 320px; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }

  /* DISPLAY */
  .display { background: #0f3460; border-radius: 12px; padding: 20px 18px; margin-bottom: 20px; text-align: right; }
  .expr    { font-size: 0.85rem; color: #aaa; min-height: 20px; margin-bottom: 6px; word-break: break-all; }
  .result  { font-size: 2.4rem; color: #fff; font-weight: 300; min-height: 48px; letter-spacing: -1px; }
  .error   { color: #e74c3c !important; font-size: 1.4rem !important; }

  /* GRID */
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  button {
    padding: 18px 10px; font-size: 1rem; border: none; border-radius: 10px;
    cursor: pointer; font-family: inherit; font-weight: 500;
    background: #1a1a2e; color: #e0e0e0;
    transition: transform 0.1s, opacity 0.15s;
  }
  button:hover  { opacity: 0.8; }
  button:active { transform: scale(0.94); }
  .op   { background: #e67e22; color: #fff; }
  .eq   { background: #27ae60; color: #fff; }
  .fn   { background: #0f3460; color: #53d8fb; }
  .span2 { grid-column: span 2; }

  /* HISTORY */
  .history { background: #16213e; border-radius: 12px; padding: 16px; width: 320px; max-height: 140px; overflow-y: auto; }
  .history h4 { font-size: 0.72rem; letter-spacing: 2px; color: #aaa; margin-bottom: 10px; }
  .hitem { font-size: 0.82rem; color: #ccc; padding: 5px 0; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; justify-content: space-between; }
  .hitem:last-child { border: none; }
  .hitem span { color: #53d8fb; font-weight: 600; }
</style>
</head>
<body>

<div class="calc">
  <div class="display">
    <div class="expr"   id="expr"></div>
    <div class="result" id="result">0</div>
  </div>
  <div class="grid">
    <button class="fn"    onclick="clearAll()">AC</button>
    <button class="fn"    onclick="del()">⌫</button>
    <button class="fn"    onclick="app('%')">%</button>
    <button class="op"    onclick="app('/')">÷</button>

    <button onclick="app('7')">7</button>
    <button onclick="app('8')">8</button>
    <button onclick="app('9')">9</button>
    <button class="op" onclick="app('*')">×</button>

    <button onclick="app('4')">4</button>
    <button onclick="app('5')">5</button>
    <button onclick="app('6')">6</button>
    <button class="op" onclick="app('-')">−</button>

    <button onclick="app('1')">1</button>
    <button onclick="app('2')">2</button>
    <button onclick="app('3')">3</button>
    <button class="op" onclick="app('+')">+</button>

    <button class="span2" onclick="app('0')">0</button>
    <button onclick="app('.')">.</button>
    <button class="eq"  onclick="calculate()">=</button>
  </div>
</div>

<div class="history">
  <h4>HISTORY</h4>
  <div id="histList"></div>
</div>

<script>
  let expr = '';
  const ops = ['+', '-', '*', '/'];
  const resultEl = document.getElementById('result');
  const exprEl   = document.getElementById('expr');
  const histList = document.getElementById('histList');
  const history  = [];

  function fmt(s) { return String(s).replace(/\*/g, '×').replace(/\//g, '÷'); }

  function app(v) {
    if (ops.includes(v) && ops.includes(expr.slice(-1))) expr = expr.slice(0, -1);
    if (!expr && ops.includes(v)) return;
    expr += v;
    exprEl.textContent  = fmt(expr);
    try { resultEl.textContent = eval(expr); resultEl.className = 'result'; }
    catch { resultEl.textContent = expr; }
  }

  function clearAll() { expr = ''; exprEl.textContent = ''; resultEl.textContent = '0'; resultEl.className = 'result'; }

  function del() {
    expr = expr.slice(0, -1);
    exprEl.textContent  = fmt(expr);
    try { resultEl.textContent = expr ? eval(expr) : '0'; } catch { resultEl.textContent = expr; }
  }

  function calculate() {
    if (!expr) return;
    try {
      const ans  = eval(expr);
      const disp = `${fmt(expr)} = ${ans}`;
      history.unshift({ expr: fmt(expr), ans });
      histList.innerHTML = history.slice(0, 8).map(h =>
        `<div class="hitem">${h.expr} =<span>${h.ans}</span></div>`
      ).join('');
      exprEl.textContent  = fmt(expr);
      expr = String(ans);
      resultEl.textContent = ans;
      resultEl.className   = 'result';
    } catch {
      resultEl.textContent = 'Error';
      resultEl.className   = 'result error';
      expr = '';
    }
  }

  document.addEventListener('keydown', e => {
    if ('0123456789.+-*/%'.includes(e.key)) app(e.key);
    else if (e.key === 'Enter' || e.key === '=') calculate();
    else if (e.key === 'Backspace') del();
    else if (e.key === 'Escape') clearAll();
  });
</script>
</body>
</html>
