<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Q15 - Stopwatch (Detailed)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px; padding: 20px; }

  /* CLOCK FACE */
  .clock { background: #16213e; border-radius: 20px; padding: 40px 50px; text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5); }
  .label { font-size: 0.72rem; letter-spacing: 4px; text-transform: uppercase; color: #aaa; margin-bottom: 12px; }
  .time  { font-size: 5rem; font-weight: 300; color: #fff; letter-spacing: 4px; font-family: 'Courier New', monospace; }
  .time .ms { font-size: 2.5rem; color: #6c5ce7; vertical-align: bottom; }
  .status { margin-top: 12px; font-size: 0.78rem; letter-spacing: 2px; color: #aaa; }
  .status.running { color: #00b894; }
  .status.stopped { color: #e74c3c; }

  /* BUTTONS */
  .controls { display: flex; gap: 14px; }
  .btn { padding: 14px 32px; font-size: 0.95rem; font-family: inherit; font-weight: 600; border: none; border-radius: 12px; cursor: pointer; transition: transform 0.1s, opacity 0.2s; letter-spacing: 1px; }
  .btn:hover  { opacity: 0.85; }
  .btn:active { transform: scale(0.95); }
  .btn-start { background: #00b894; color: #fff; }
  .btn-stop  { background: #e74c3c; color: #fff; }
  .btn-lap   { background: #0f3460; color: #53d8fb; }
  .btn-reset { background: #2d3436; color: #aaa; }

  /* LAP TABLE */
  .laps { background: #16213e; border-radius: 16px; padding: 20px; width: 100%; max-width: 380px; max-height: 220px; overflow-y: auto; }
  .laps h4 { font-size: 0.72rem; letter-spacing: 3px; color: #aaa; margin-bottom: 12px; }
  .lap-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.06); font-size: 0.85rem; color: #ccc; }
  .lap-row:last-child { border: none; }
  .lap-row span { color: #6c5ce7; font-weight: 600; }
  .no-laps { font-size: 0.82rem; color: #555; text-align: center; padding: 10px 0; }
</style>
</head>
<body>

<div class="clock">
  <div class="label">Stopwatch</div>
  <div class="time"><span id="hms">00:00:00</span><span class="ms">.<span id="ms">00</span></span></div>
  <div class="status" id="status">Ready</div>
</div>

<div class="controls">
  <button class="btn btn-start" onclick="start()">▶ Start</button>
  <button class="btn btn-stop"  onclick="stop()">⏸ Stop</button>
  <button class="btn btn-lap"   onclick="lap()">⚑ Lap</button>
  <button class="btn btn-reset" onclick="reset()">↺ Reset</button>
</div>

<div class="laps">
  <h4>LAP TIMES</h4>
  <div id="lapList"><div class="no-laps">No laps recorded yet.</div></div>
</div>

<script>
  let interval  = null;
  let elapsed   = 0;      // milliseconds
  let lapStart  = 0;
  let laps      = [];
  let running   = false;

  function pad(n, d = 2) { return String(n).padStart(d, '0'); }

  function fmt(ms) {
    const total = Math.floor(ms / 10);
    const cs    = total % 100;
    const s     = Math.floor(total / 100) % 60;
    const m     = Math.floor(total / 6000) % 60;
    const h     = Math.floor(total / 360000);
    return { hms: `${pad(h)}:${pad(m)}:${pad(s)}`, ms: pad(cs) };
  }

  function render() {
    const f = fmt(elapsed);
    document.getElementById('hms').textContent = f.hms;
    document.getElementById('ms').textContent  = f.ms;
  }

  function start() {
    if (running) return;
    running  = true;
    const t0 = Date.now() - elapsed;
    interval = setInterval(() => { elapsed = Date.now() - t0; render(); }, 10);
    document.getElementById('status').textContent  = 'Running...';
    document.getElementById('status').className    = 'status running';
  }

  function stop() {
    if (!running) return;
    clearInterval(interval);
    running = false;
    document.getElementById('status').textContent = 'Stopped';
    document.getElementById('status').className   = 'status stopped';
  }

  function lap() {
    if (!running) return;
    const lapTime = elapsed - lapStart;
    lapStart      = elapsed;
    laps.unshift({ num: laps.length + 1, lap: lapTime, total: elapsed });
    const lapEl = document.getElementById('lapList');
    lapEl.innerHTML = laps.map(l => {
      const f = fmt(l.lap);
      return `<div class="lap-row">Lap ${l.num}<span>${f.hms}.${f.ms}</span></div>`;
    }).join('');
  }

  function reset() {
    stop();
    elapsed  = 0;
    lapStart = 0;
    laps     = [];
    render();
    document.getElementById('lapList').innerHTML = '<div class="no-laps">No laps recorded yet.</div>';
    document.getElementById('status').textContent = 'Ready';
    document.getElementById('status').className   = 'status';
  }
</script>
</body>
</html>
